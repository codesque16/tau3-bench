# Thinking mode: system turn uses <|think|> inside the first system block; user asks a question.
# Mirrors the "Thinking Mode" example in Gemma 4 docs (system content may be empty after <|think|>).

prompt_mode: template
bos_token: "<bos>"
enable_thinking: true
add_generation_prompt: true

vertex_openai_chat_url: https://gemma4-26b-fp8-gcreopmlnq-uc.a.run.app
vertex_openai_chat_model: gemma4-26b-fp8

messages:
  - role: system
    content: ""
  - role: user
    content: "What is the water formula?"

tools: []

parameters:
  max_tokens: 512
  temperature: 0.0
  stream: false
  stop: ["<turn|>", "<|turn>"]
  add_special_tokens: false
  skip_special_tokens: false
  include_stop_str_in_output: true
  timeout_s: 180
