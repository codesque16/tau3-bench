# Optional: select which runs to execute from this file.
# Runs may set `base_run: <another_run_id>` to inherit that template and override/add keys (deep merge).
# Chains are supported (base_run pointing to a run that also has base_run). Cycles are rejected.
# Use "retail_assistant_solo" for one-shot assistant (ticket in first user turn, policy_solo.md).
# Optional root key: run_concurrency: N — run up to N selected YAML runs in parallel (default 1). Override: --run-concurrency N.
#
# Vertex dedicated-endpoint solos (from repo root, after ``cd tau3-bench-fork``):
#   uv run tau2config --config examples/retail_vertex_text.yaml --run-ids retail_solo_qwen35_9b_vertex_endpoint
#   uv run tau2config --config examples/retail_vertex_text.yaml --run-ids retail_solo_gemma4_31b_vertex_endpoint
#   uv run tau2config --config examples/retail_vertex_text.yaml --run-ids retail_solo_qwen35_9b_vertex_endpoint retail_solo_gemma4_31b_vertex_endpoint
#
# OpenAI-compatible vLLM on Cloud Run (identity token auth, same as ``gcloud auth print-identity-token`` audience = service URL):
#   uv run tau2config --config examples/retail_vertex_text.yaml --run-ids retail_solo_gemma4_26b_bf16_cloud_run
#   # optional: retail_solo_gemma4_26b_fp8_cloud_run retail_solo_gemma4_31b_fp8_cloud_run
# Conversation (agent on Cloud Run Gemma, user sim on Vertex Gemini):
#   uv run tau2config --config examples/retail_vertex_text.yaml --run-ids retail_conv_full_gemma4_26b_bf16_cloud_run
#   # optional: retail_conv_full_gemma4_26b_fp8_cloud_run retail_conv_full_gemma4_31b_fp8_cloud_run
#
# Keep-warm ping (from repo ``scripts/gcloud_scripts``): same run ids as keys — see ``vertex_warm_endpoints.yaml`` or
#   ./vertex_endpoint_warm.sh --config ../../tau3-bench-fork/examples/retail_vertex_text.yaml retail_solo_gemma4_31b_vertex_endpoint

