      openai_api_key: "EMPTY"                         # vLLM default
      openai_model: "google/gemma-4-26B-A4B-it"
      temperature: 0
      max_tokens: 2048
      skip_special_tokens: true
      chat_template_kwargs:
        enable_thinking: true
        add_generation_prompt: true
        injection_prefix: "<|channel>thought\nLet me first start by the reasoning on the SOP graph. I will focus on the relevant nodes, fetch relevant policies and tool_hints as per the instructions and structure.\nSOP_POLICIES:\n\tGLOBAL:\n\t\trelevant_policies:"

