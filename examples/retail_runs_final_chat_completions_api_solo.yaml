run_concurrency: 6

runs:
  # Base template for openai_agent solo runs.
  retail_solo_openai_agent_original_policy:
    domain: retail
    assistant_solo_mode: true
    num_trials: 4
    task_ids: ["3","15","18", "35"]
    trial_concurrency: 4
    max_concurrency: 30
    verbose_logs: true
    seed: -1
    agent: openai_agent
    save_to: retail_solo_openai_agent_original_policy
    retail_policy_path: data/tau2/domains/retail/policy_solo.md
    fresh: true
    agent_llm: gemma4-26b-openai
    agent_llm_args:
      openai_base_url: "http://35.224.147.230:8000"   # vLLM server root
      openai_api_key: "EMPTY"                         # vLLM default
      openai_model: "google/gemma-4-26B-A4B-it"
      logprobs: true
      top_logprobs: 10
      temperature: 0
      top_p: 0.95
      top_k: 64
      max_tokens: 2048
      skip_special_tokens: true
      chat_template_kwargs:
        enable_thinking: true
        add_generation_prompt: true

  retail_solo_openai_agent_mermaid_thinking_instructions:
    domain: retail
    assistant_solo_mode: true
    num_trials: 4
    # task_ids: ["0","1","2"]
    trial_concurrency: 4
    max_concurrency: 30
    verbose_logs: true
    seed: -1
