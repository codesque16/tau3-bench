      openai_api_key: "EMPTY"                         # vLLM default
      openai_model: "google/gemma-4-26B-A4B-it"
      logprobs: true
      top_logprobs: 10
      temperature: 0
      top_p: 0.95
      top_k: 64
      max_tokens: 4096
      skip_special_tokens: false
      jinja_template_path: "../scripts/gcloud_scripts/gemma4_26b_injected_add_injection.jinja"
      chat_template_kwargs:
        enable_thinking: true
        add_generation_prompt: true

